# Auto-deploy TaskFlow Pro when changes land on main.
#
# ONE-TIME SETUP — add these GitHub repo secrets (Settings → Secrets → Actions):
#   GCP_SA_KEY              — run: bash scripts/setup-gcp-github-actions.sh
#   SUPABASE_ACCESS_TOKEN   — https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD    — Supabase Dashboard → Project Settings → Database
#   GOOGLE_AI_API_KEY       — (optional) Gemini API key for Polish with AI & daily quotes
#                             https://aistudio.google.com/apikey
#
# Until secrets are set, jobs fail fast with a clear message (not a cryptic auth error).

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: robust-solution-425310-t9
  GCP_REGION: europe-west1
  CLOUD_RUN_SERVICE: tasflow-pro
  SUPABASE_PROJECT_REF: nekdjoquirhecmejuoba
  # Public keys — same values as scripts/deploy-cloudshell.sh (already in git).
  VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5la2Rqb3F1aXJoZWNtZWp1b2JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODYzMTIsImV4cCI6MjA5NjY2MjMxMn0.fsBzWsY7moMUlNQHIUBtE7cHx-_6A45ArKw49B5SjyY
  VITE_FIREBASE_API_KEY: AIzaSyDR8Yzd58za5h0wlcj-EJp4MdBInPnLePU

jobs:
  deploy-frontend:
    name: Cloud Run (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate GCP secret
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "::error title=Missing GCP_SA_KEY::GitHub secret GCP_SA_KEY is not set."
            echo ""
            echo "Fix (one time, in Cloud Shell):"
            echo "  export PROJECT_ID=robust-solution-425310-t9"
            echo "  bash scripts/setup-gcp-github-actions.sh"
            echo ""
            echo "Then paste the JSON into:"
            echo "  GitHub → repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "  Name: GCP_SA_KEY"
            exit 1
          fi

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Prepare GCP (APIs & Artifact Registry)
        run: |
          gcloud config set project "$GCP_PROJECT_ID"
          # APIs are already enabled via Cloud Shell; don't fail if SA can't re-enable.
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com cloudbuild.googleapis.com --quiet 2>/dev/null || \
            echo "Note: APIs already enabled (or enable skipped — continuing)."
          gcloud artifacts repositories describe cloud-run-source-deploy --location="$GCP_REGION" 2>/dev/null || \
            gcloud artifacts repositories create cloud-run-source-deploy \
              --repository-format=docker --location="$GCP_REGION" --quiet 2>/dev/null || \
            echo "Note: Artifact Registry repo already exists (continuing)."

      # Mirrors scripts/deploy-cloudshell.sh (proven working path).
      # Runtime env is injected at Cloud Run — no VITE_* build args required.
      - name: Build image via Cloud Build
        run: |
          TAG="${GITHUB_SHA::7}"
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/cloud-run-source-deploy/${CLOUD_RUN_SERVICE}/${CLOUD_RUN_SERVICE}:${TAG}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          BUILD_ID=$(gcloud builds submit --tag "$IMAGE" \
            --timeout=1200s \
            --machine-type=e2-highcpu-8 \
            --project "$GCP_PROJECT_ID" \
            --async \
            --format='value(id)' \
            .)
          echo "Cloud Build ID: $BUILD_ID"
          STATUS=""
          for _ in $(seq 1 80); do
            STATUS=$(gcloud builds describe "$BUILD_ID" --project "$GCP_PROJECT_ID" --format='value(status)')
            echo "Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "INTERNAL_ERROR" ]; then
              echo "::error::Cloud Build failed with status $STATUS"
              gcloud builds describe "$BUILD_ID" --project "$GCP_PROJECT_ID" --format='yaml(failureInfo,statusDetail)' || true
              exit 1
            fi
            sleep 15
          done
          if [ "$STATUS" != "SUCCESS" ]; then
            echo "::error::Timed out waiting for Cloud Build $BUILD_ID (last status: $STATUS)"
            exit 1
          fi

      - name: Deploy to Cloud Run
        run: |
          cat > /tmp/cloudrun.env.yaml <<'ENVEOF'
          VITE_SUPABASE_URL: "https://nekdjoquirhecmejuoba.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5la2Rqb3F1aXJoZWNtZWp1b2JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwODYzMTIsImV4cCI6MjA5NjY2MjMxMn0.fsBzWsY7moMUlNQHIUBtE7cHx-_6A45ArKw49B5SjyY"
          VITE_APP_URL: "https://task.youthnic.shop"
          VITE_FIREBASE_API_KEY: "AIzaSyDR8Yzd58za5h0wlcj-EJp4MdBInPnLePU"
          VITE_FIREBASE_AUTH_DOMAIN: "taskflow-pro-by-vb-exports.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "taskflow-pro-by-vb-exports"
          VITE_FIREBASE_STORAGE_BUCKET: "taskflow-pro-by-vb-exports.firebasestorage.app"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "684659983755"
          VITE_FIREBASE_APP_ID: "1:684659983755:web:e255b6e5a60506c92a5b8e"
          VITE_FIREBASE_MEASUREMENT_ID: "G-YWGNCXGK7M"
          ENVEOF
          # Strip heredoc indentation so gcloud gets valid YAML.
          sed -i 's/^          //' /tmp/cloudrun.env.yaml
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --env-vars-file /tmp/cloudrun.env.yaml \
            --project "$GCP_PROJECT_ID"

      - name: Print service URL
        run: |
          URL=$(gcloud run services describe "$CLOUD_RUN_SERVICE" --region "$GCP_REGION" --format='value(status.url)')
          echo "Deployed frontend: $URL"

  deploy-supabase:
    name: Supabase (backend + MCP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Supabase secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          MISSING=0
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error title=Missing SUPABASE_ACCESS_TOKEN::GitHub secret SUPABASE_ACCESS_TOKEN is not set."
            echo "  Create at: https://supabase.com/dashboard/account/tokens"
            MISSING=1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error title=Missing SUPABASE_DB_PASSWORD::GitHub secret SUPABASE_DB_PASSWORD is not set."
            echo "  Find at: Supabase Dashboard → Project Settings → Database → password"
            MISSING=1
          fi
          if [ "$MISSING" -eq 1 ]; then
            echo ""
            echo "Add both secrets at:"
            echo "  GitHub → repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Deploy migrations & edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          PROJECT_REF: ${{ env.SUPABASE_PROJECT_REF }}
          CI: "true"
        run: bash scripts/deploy-supabase.sh
